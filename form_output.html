<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> - JobBoard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkblue: {
                            900: '#0a192f',
                            800: '#112240',
                            700: '#233554',
                            600: '#495670',
                        },
                        accent: {
                            DEFAULT: '#64ffda',
                            hover: '#52e0c4'
                        }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0a192f; color: #e6f1ff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 34, 64, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">

<!-- Navigation -->
<nav class="glass sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      <div class="flex items-center">
        <a href="/" class="text-2xl font-bold text-accent tracking-tighter">Job<span class="text-white">Board</span></a>
      </div>
      <div class="hidden md:block">
        <div class="ml-10 flex items-baseline space-x-4">
          <a href="/" class="hover:text-accent px-3 py-2 rounded-md font-medium transition-colors">Find Jobs</a>
          
            <a href="/accounts/login/" class="hover:text-accent px-3 py-2 rounded-md font-medium transition-colors">Login</a>
            <a href="/accounts/register/" class="bg-accent text-darkblue-900 px-4 py-2 rounded-md font-bold hover:bg-accent-hover transition-colors">Sign Up</a>
          
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- Messages -->


<!-- Main Content -->
<main class="flex-grow w-full">
    
<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-white tracking-tight"></h1>
        <p class="mt-2 text-sm text-gray-400">Fill in the job details below to attract the best candidates.</p>
    </div>

    <div class="glass shadow-2xl rounded-xl border border-white/10 overflow-hidden">
        <div class="p-8">
            <form method="POST" class="space-y-6">
                
                
                
                <div>
                    <label for="id_title" class="block text-sm font-medium text-gray-300">Title</label>
                    <div class="mt-2">
                        
                            <input type="text" name="title" id="id_title" value="" class="appearance-none block w-full px-3 py-2 border border-white/20 bg-darkblue-800 placeholder-gray-400 text-white rounded-md shadow-sm focus:outline-none focus:ring-accent focus:border-accent sm:text-sm" />
                        
                    </div>
                    
                    
                </div>
                
                <div>
                    <label for="id_category" class="block text-sm font-medium text-gray-300">Category</label>
                    <div class="mt-2">
                        
                            <select name="category" id="id_category" class="block w-full px-3 py-2 border border-white/20 bg-darkblue-800 text-white rounded-md shadow-sm focus:outline-none focus:ring-accent focus:border-accent sm:text-sm">
                                
                                    <option value="" >---------</option>
                                
                                    <option value="1" >Software Engineering</option>
                                
                                    <option value="2" >Design</option>
                                
                                    <option value="3" >Marketing</option>
                                
                                    <option value="4" >Sales</option>
                                
                            </select>
                        
                    </div>
                    
                    
                </div>
                
                <div>
                    <label for="id_description" class="block text-sm font-medium text-gray-300">Description</label>
                    <div class="mt-2">
                        
                            <textarea name="description" id="id_description" rows="4" class="appearance-none block w-full px-3 py-2 border border-white/20 bg-darkblue-800 placeholder-gray-400 text-white rounded-md shadow-sm focus:outline-none focus:ring-accent focus:border-accent sm:text-sm"></textarea>
                        
                    </div>
                    
                    
                </div>
                
                <div>
                    <label for="id_location" class="block text-sm font-medium text-gray-300">Location</label>
                    <div class="mt-2">
                        
                            <input type="text" name="location" id="id_location" value="" class="appearance-none block w-full px-3 py-2 border border-white/20 bg-darkblue-800 placeholder-gray-400 text-white rounded-md shadow-sm focus:outline-none focus:ring-accent focus:border-accent sm:text-sm" />
                        
                    </div>
                    
                    
                </div>
                
                <div>
                    <label for="id_salary_range" class="block text-sm font-medium text-gray-300">Salary range</label>
                    <div class="mt-2">
                        
                            <input type="text" name="salary_range" id="id_salary_range" value="" class="appearance-none block w-full px-3 py-2 border border-white/20 bg-darkblue-800 placeholder-gray-400 text-white rounded-md shadow-sm focus:outline-none focus:ring-accent focus:border-accent sm:text-sm" />
                        
                    </div>
                    
                    
                </div>
                
                <div>
                    <label for="id_job_type" class="block text-sm font-medium text-gray-300">Job type</label>
                    <div class="mt-2">
                        
                            <select name="job_type" id="id_job_type" class="block w-full px-3 py-2 border border-white/20 bg-darkblue-800 text-white rounded-md shadow-sm focus:outline-none focus:ring-accent focus:border-accent sm:text-sm">
                                
                                    <option value="Full Time" selected>Full Time</option>
                                
                                    <option value="Part Time" >Part Time</option>
                                
                                    <option value="Contract" >Contract</option>
                                
                                    <option value="Internship" >Internship</option>
                                
                            </select>
                        
                    </div>
                    
                    
                </div>
                
                <div>
                    <label for="id_is_active" class="block text-sm font-medium text-gray-300">Is active</label>
                    <div class="mt-2">
                        
                            <div class="flex items-center">
                                <input type="checkbox" name="is_active" id="id_is_active" checked class="h-4 w-4 text-accent focus:ring-accent border-gray-300 rounded bg-darkblue-800">
                                <span class="ml-2 text-sm text-gray-400">Mark as active listing</span>
                            </div>
                        
                    </div>
                    
                    
                </div>
                

                <div class="pt-5 border-t border-white/10 flex justify-end">
                    <a href="/employer/dashboard/" class="bg-transparent text-gray-300 hover:text-white font-medium py-2 px-6 rounded-md transition-colors mr-3">Cancel</a>
                    <button type="submit" class="inline-flex justify-center py-2 px-6 border border-transparent shadow-lg text-sm font-bold rounded-md text-darkblue-900 bg-accent hover:bg-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent focus:ring-offset-darkblue-900 transition-colors">
                        Post Job
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

</main>

<!-- Footer -->
<footer class="bg-darkblue-800 py-8 mt-auto border-t border-white/10">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm text-gray-400">
        &copy; 2026 JobBoard App. All rights reserved.
    </div>
</footer>

</body>
</html>
