version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=jobboard
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  backend:
    build: backend/
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/jobboard
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CHANNELS_REDIS_URL=redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build: backend/
    command: celery -A core worker --loglevel=info
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/jobboard
      - CELERY_BROKER_URL=redis://redis:6379/1

volumes:
  postgres_data:
