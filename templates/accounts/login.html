{% extends 'base.html' %}
{% block title %}Login - JobBoard{% endblock %}
{% block content %}
<div class="min-h-[calc(100vh-160px)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-md w-full glass p-8 rounded-xl shadow-2xl border border-white/10">
    <div class="text-center">
      <h2 class="mt-2 text-3xl font-extrabold text-white">Sign in to your account</h2>
    </div>
    <form class="mt-8 space-y-6" method="POST">
      {% csrf_token %}
      <div class="rounded-md shadow-sm space-y-4">
        <div>
          <label for="id_username" class="sr-only">Username</label>
          <input id="id_username" name="username" type="text" autocomplete="username" required class="appearance-none relative block w-full px-3 py-2 border border-white/20 bg-darkblue-800 placeholder-gray-400 text-white rounded-md focus:outline-none focus:ring-accent focus:border-accent focus:z-10 sm:text-sm" placeholder="Username">
        </div>
        <div>
          <label for="id_password" class="sr-only">Password</label>
          <input id="id_password" name="password" type="password" autocomplete="current-password" required class="appearance-none relative block w-full px-3 py-2 border border-white/20 bg-darkblue-800 placeholder-gray-400 text-white rounded-md focus:outline-none focus:ring-accent focus:border-accent focus:z-10 sm:text-sm" placeholder="Password">
        </div>
      </div>
      
      {% if form.errors %}
      <div class="text-red-400 text-sm mt-2 text-center">
        Invalid username or password.
      </div>
      {% endif %}

      <div class="flex items-center justify-between">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-accent focus:ring-accent border-gray-300 rounded bg-darkblue-800">
          <label for="remember-me" class="ml-2 block text-sm text-gray-300">
            Remember me
          </label>
        </div>
        <div class="text-sm">
          <a href="#" class="font-medium text-accent hover:text-accent-hover">
            Forgot your password?
          </a>
        </div>
      </div>

      <div>
        <button type="submit" class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-bold rounded-md text-darkblue-900 bg-accent hover:bg-accent-hover focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent focus:ring-offset-darkblue-900 transition-colors">
          Sign in
        </button>
      </div>
    </form>
    <div class="mt-6 text-center text-sm text-gray-400">
        Don't have an account? <a href="{% url 'accounts:register' %}" class="font-medium text-accent hover:text-accent-hover">Register here</a>
    </div>
  </div>
</div>
{% endblock %}
